project:
  id: 98e2b3e2-6d5
  name: loguetown
  repo_path: .
  default_branch: main

orchestrator:
  model:
    provider: claude
    id: claude-opus-4-6
  max_tasks_per_plan: 20
  stale_run_timeout_minutes: 20

scheduler:
  max_parallel_runs: 3
  max_fix_attempts: 3

embeddings:
  provider: local
  model: all-MiniLM-L6-v2
  dimensions: 384

memory:
  episodic_retention:
    max_entries: 100
    max_days: 90
  retrieval:
    top_k: 5
    min_similarity: 0.65
  max_tokens_injected: 6000

checks: {}
# Example:
# checks:
#   setup:
#     run: "npm ci"
#   lint:
#     run: "npx eslint src"
#   typecheck:
#     run: "npx tsc --noEmit"
#   test_fast:
#     run: "npm test -- --testPathPattern=unit"
#     timeout_seconds: 60
#   test_full:
#     run: "npm test"
#     timeout_seconds: 300

merge:
  approval_policy: require_human
  strategy: squash
  require_checks: []
  require_review: true
  restricted_paths: []

escalation:
  auto_bump_after_minutes: 30
  critical_task_threshold: 3

notifications:
  on_needs_human:
    desktop: true
  on_escalation_bumped:
    desktop: true
  on_merge_ready:
    desktop: true

gui:
  port: 4242
  auth: false
